<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنشاء الحساب - واتساب أسامة</title>
    <style>
        body { font-family: Arial; background-color: #ece5dd; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .profile-card { background: white; padding: 25px; border-radius: 15px; width: 90%; max-width: 400px; text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        .profile-img-upload { width: 100px; height: 100px; background: #ddd; border-radius: 50%; margin: 0 auto 20px; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 2px dashed #075E54; overflow: hidden; }
        .profile-img-upload img { width: 100%; height: 100%; object-fit: cover; }
        input, textarea { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-family: Arial; }
        .id-display { background: #e1f5fe; color: #01579b; padding: 10px; border-radius: 5px; font-weight: bold; margin: 15px 0; display: none; }
        button { width: 100%; padding: 12px; background: #075E54; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; }
        button:hover { background: #128C7E; }
    </style>
</head>
<body>

<div class="profile-card">
    <h2 style="color: #075E54;">إنشاء ملف شخصي</h2>
    
    <div class="profile-img-upload" onclick="document.getElementById('fileInput').click()">
        <span id="plus">+</span>
        <input type="file" id="fileInput" style="display:none" accept="image/*" onchange="previewImage(event)">
        <img id="preview" style="display:none">
    </div>

    <input type="text" id="userName" placeholder="الاسم بالكامل">
    <input type="tel" id="userPhone" placeholder="رقم التليفون">
    <textarea id="userBio" placeholder="السيرة الذاتية (Bio)"></textarea>

    <div id="idBox" class="id-display"></div>

    <button id="saveBtn" onclick="generateID()">حفظ وإنشاء ID</button>
</div>

<script>
    function previewImage(event) {
        var reader = new FileReader();
        reader.onload = function() {
            var output = document.getElementById('preview');
            var plus = document.getElementById('plus');
            output.src = reader.result;
            output.style.display = 'block';
            plus.style.display = 'none';
        }
        reader.readAsDataURL(event.target.files[0]);
    }

    function generateID() {
        var name = document.getElementById('userName').value;
        if (name === "") {
            alert("اكتب اسمك الأول يا أسامة!");
            return;
        }

        // إنشاء ID عشوائي
        var randomID = "OS-" + Math.floor(1000 + Math.random() * 9000);
        
        var idBox = document.getElementById('idBox');
        idBox.innerText = "الـ ID الخاص بك هو: " + randomID;
        idBox.style.display = "block";

        document.getElementById('saveBtn').innerText = "تم الحفظ بنجاح";
        document.getElementById('saveBtn').style.background = "#25D366";

        // تخزين مؤقت في المتصفح (للتجربة)
        localStorage.setItem("myID", randomID);
        localStorage.setItem("myName", name);

        alert("تم إنشاء حسابك! الـ ID بتاعك هو " + randomID + ". احفظه عشان الناس تبحث عنك بيه.");
    }
</script>

</body>
</html>
