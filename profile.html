<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تعديل البروفايل - واتساب أسامة</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --wa-dark-bg: #0b141a;
            --wa-header-bg: #202c33;
            --wa-green: #00a884;
            --wa-text: #e9edef;
        }
        body { font-family: Arial, sans-serif; background-color: var(--wa-dark-bg); color: var(--wa-text); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .profile-pic { width: 120px; height: 120px; background: #687782; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 50px; margin-bottom: 20px; color: white; position: relative; }
        .edit-icon { position: absolute; bottom: 5px; right: 5px; background: var(--wa-green); width: 35px; height: 35px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 16px; border: 3px solid var(--wa-dark-bg); }
        .input-group { width: 100%; max-width: 400px; margin-bottom: 20px; }
        label { display: block; color: var(--wa-green); margin-bottom: 5px; font-size: 14px; }
        input, textarea { width: 100%; padding: 12px; background: #202c33; border: none; border-bottom: 2px solid #2a3942; color: white; border-radius: 8px; outline: none; box-sizing: border-box; }
        input:focus { border-bottom-color: var(--wa-green); }
        .id-section { background: #182229; padding: 15px; border-radius: 10px; text-align: center; margin-bottom: 25px; width: 100%; max-width: 400px; }
        .save-btn { background: var(--wa-green); color: #0b141a; border: none; padding: 15px 40px; border-radius: 30px; font-weight: bold; cursor: pointer; width: 100%; max-width: 400px; }
        #status { margin-top: 15px; font-size: 14px; }
        .back-btn { margin-top: 20px; color: var(--wa-green); text-decoration: none; }
    </style>
</head>
<body>

    <div class="profile-pic">
        <i class="fas fa-user"></i>
        <div class="edit-icon"><i class="fas fa-camera"></i></div>
    </div>

    <div class="id-section">
        <span style="color: #8696a0;">الـ ID الخاص بك:</span><br>
        <strong id="myIdDisplay" style="font-size: 20px; color: white;">OS-2581</strong>
        <i class="fas fa-copy" onclick="copyID('OS-2581')" style="margin-right: 10px; cursor: pointer; color: var(--wa-green);"></i>
    </div>

    <div class="input-group">
        <label>الاسم</label>
        <input type="text" id="name" placeholder="اكتب اسمك هنا...">
    </div>

    <div class="input-group">
        <label>رقم الهاتف</label>
        <input type="text" id="phone" placeholder="01xxxxxxxxx">
    </div>

    <div class="input-group">
        <label>الأخبار (Bio)</label>
        <textarea id="bio" rows="2" placeholder="اكتب حالتك..."></textarea>
    </div>

    <button class="save-btn" onclick="saveProfile()">حفظ التغييرات</button>
    
    <div id="status"></div>

    <a href="index.html" class="back-btn"><i class="fas fa-arrow-right"></i> العودة للدردشات</a>

    <script type="module" src="script.js"></script>
</body>
</html>
