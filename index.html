<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>واتساب أسامة - النسخة المطورة</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --wa-dark-bg: #0b141a;
            --wa-header-bg: #202c33;
            --wa-text-main: #e9edef;
            --wa-text-dim: #8696a0;
            --wa-green: #00a884;
        }

        body { font-family: Arial, sans-serif; background-color: var(--wa-dark-bg); color: var(--wa-text-main); margin: 0; padding-bottom: 70px; overflow-x: hidden; }
        
        .header { background-color: var(--wa-header-bg); padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        .header h2 { margin: 0; font-size: 20px; color: var(--wa-green); }
        .header-icons { color: var(--wa-text-dim); display: flex; gap: 20px; font-size: 20px; cursor: pointer; }

        .search-box { padding: 10px 15px; }
        .search-inner { background: #202c33; border-radius: 25px; display: flex; align-items: center; padding: 8px 15px; }
        .search-inner input { background: transparent; border: none; color: white; flex: 1; padding: 5px; outline: none; }
        .search-inner i { color: var(--wa-text-dim); margin-left: 10px; }

        .chat-list { padding: 10px 0; }
        .user-card { display: flex; align-items: center; padding: 15px; border-bottom: 0.5px solid #222d34; cursor: pointer; transition: 0.3s; }
        .user-card:hover { background: #202c33; }
        .user-avatar { width: 50px; height: 50px; background: var(--wa-green); border-radius: 50%; margin-left: 15px; display: flex; align-items: center; justify-content: center; font-size: 20px; color: #fff; font-weight: bold; }
        .user-details { flex: 1; }
        .user-details b { font-size: 16px; display: block; margin-bottom: 5px; }
        .user-details p { color: var(--wa-text-dim); font-size: 13px; margin: 0; }
        
        .copy-btn { background: transparent; border: 1px solid var(--wa-green); color: var(--wa-green); padding: 2px 8px; border-radius: 5px; font-size: 11px; cursor: pointer; }

        /* شريط التنقل السفلي المعدل */
        .nav-bottom { position: fixed; bottom: 0; width: 100%; background: #202c33; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #2a3942; }
        .nav-item { text-align: center; color: var(--wa-text-dim); font-size: 12px; text-decoration: none; position: relative; flex: 1; }
        .nav-item i { font-size: 22px; display: block; margin-bottom: 5px; }
        .nav-item.active { color: var(--wa-green); }
        .msg-badge { background: var(--wa-green); color: #0b141a; padding: 2px 6px; border-radius: 50%; font-size: 10px; font-weight: bold; position: absolute; top: -5px; right: 25%; }

        .floating-btn { position: fixed; bottom: 85px; left: 20px; background: var(--wa-green); width: 55px; height: 55px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #0b141a; font-size: 22px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); cursor: pointer; }
    </style>
</head>
<body>

    <div class="header">
        <h2>واتساب أسامة</h2>
        <div class="header-icons">
            <i class="fas fa-ellipsis-v" onclick="openSettings()"></i>
        </div>
    </div>

    <div class="search-box">
        <div class="search-inner">
            <i class="fas fa-search"></i>
            <input type="text" id="searchInput" placeholder="ابحث عن ID الصديق..." onkeyup="if(event.key === 'Enter') searchUser()">
        </div>
    </div>

    <div id="searchResult" class="chat-list">
        </div>

    <div class="floating-btn">
        <i class="fas fa-plus"></i>
    </div>

    <div class="nav-bottom">
        <a href="#" class="nav-item active" onclick="showChats()">
            <span id="unreadCount" class="msg-badge">0</span>
            <i class="fas fa-comment"></i>
            الدردشات
        </a>
        <a href="#" class="nav-item" onclick="showStatus()"><i class="fas fa-circle-notch"></i>التحديثات</a>
        <a href="#" class="nav-item" onclick="showGroups()"><i class="fas fa-users"></i>المجتمعات</a>
        <a href="profile.html" class="nav-item"><i class="fas fa-user-circle"></i>بروفايلي</a>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
