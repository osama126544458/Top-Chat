<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>واتساب أسامة - الدردشة والبحث</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <style>
        body { margin: 0; background-color: #ece5dd; font-family: Arial, sans-serif; }
        .header { background: #075E54; color: white; padding: 15px; position: sticky; top: 0; z-index: 1000; }
        .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .search-container { background: white; border-radius: 20px; display: flex; align-items: center; padding: 5px 15px; margin: 5px 0; }
        .search-container input { border: none; outline: none; width: 100%; padding: 8px; font-size: 15px; }
        .search-container i { color: #999; }
        
        .chat-list { background: white; min-height: 100vh; margin-top: 5px; }
        .chat-item { display: flex; padding: 15px; align-items: center; border-bottom: 1px solid #f2f2f2; cursor: pointer; transition: 0.3s; }
        .chat-item:hover { background: #f9f9f9; }
        .chat-img { width: 50px; height: 50px; background: #075E54; border-radius: 50%; margin-left: 15px; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; overflow: hidden; }
        .chat-img img { width: 100%; height: 100%; object-fit: cover; }
        .chat-info { flex: 1; }
        .chat-name { font-weight: bold; font-size: 16px; }
        .chat-id { font-size: 12px; color: #128C7E; background: #e1f5fe; padding: 2px 6px; border-radius: 4px; display: inline-block; margin-top: 2px; }
        
        #no-result { text-align: center; padding: 50px; color: #999; display: none; }
    </style>
</head>
<body>

    <div class="header">
        <div class="header-top">
            <span style="font-size: 20px; font-weight: bold;">واتساب أسامة</span>
            <i class="fa fa-ellipsis-v"></i>
        </div>
        <div class="search-container">
            <i class="fa fa-search"></i>
            <input type="text" id="searchInput" placeholder="ابحث عن صديق بالـ ID (مثلاً: OS-2581)" onkeyup="searchFriend()">
        </div>
    </div>

    <div class="chat-list" id="chatList">
        <div class="chat-item" data-id="OS-1001">
            <div class="chat-img">K</div>
            <div class="chat-info">
                <div class="chat-name">كنزي ❤️</div>
                <div class="chat-id">ID: OS-1001</div>
            </div>
        </div>

        <div class="chat-item" data-id="OS-2581">
            <div class="chat-img"><img src="https://via.placeholder.com/50" alt="me"></div>
            <div class="chat-info">
                <div class="chat-name">أسامة قنديل (أنت)</div>
                <div class="chat-id">ID: OS-2581</div>
            </div>
        </div>
    </div>

    <div id="no-result">لم يتم العثور على مستخدم بهذا الـ ID</div>

    <script>
        function searchFriend() {
            var input = document.getElementById('searchInput').value.toUpperCase();
            var chatList = document.getElementById('chatList');
            var items = chatList.getElementsByClassName('chat-item');
            var noResult = document.getElementById('no-result');
            var found = false;

            for (var i = 0; i < items.length; i++) {
                var id = items[i].getAttribute('data-id');
                if (id.includes(input)) {
                    items[i].style.display = "flex";
                    found = true;
                } else {
                    items[i].style.display = "none";
                }
            }

            noResult.style.display = found ? "none" : "block";
        }
    </script>
</body>
</html>
